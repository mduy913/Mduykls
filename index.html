<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>DELTA RSL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --cyan: #00f2ff; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; }
        .select-custom {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            color: var(--cyan);
            font-weight: bold;
            font-size: 14px;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
        }
        .wrapper { position: relative; width: 100%; }
        .wrapper::after {
            content: '▼'; font-size: 10px; color: var(--cyan);
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            pointer-events: none;
        }
        .btn-buy {
            background: var(--cyan); color: #000; font-weight: 900;
            border-radius: 12px; padding: 18px; width: 100%;
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

<div class="w-full max-w-[450px] space-y-6 mt-5">
    <div class="glass p-6 flex justify-between items-center border-l-4 border-cyan-400">
        <div>
            <p class="text-[10px] text-gray-500 uppercase font-bold">CTV</p>
            <p id="u-id" class="font-black text-cyan-400 text-xl tracking-tighter">MDUYTC</p>
        </div>
        <div class="text-right">
            <p class="text-[10px] text-gray-500 uppercase font-bold">VÍ</p>
            <p id="u-bl" class="font-black text-yellow-400 text-xl">0đ</p>
        </div>
    </div>

    <div class="glass p-6 space-y-4">
        <div class="wrapper">
            <select id="b-type" class="select-custom" onchange="updateBSelect()">
                <option value="ngay">Gói Ngày</option>
                <option value="tuan">Gói Tuần</option>
                <option value="thang">Gói Tháng</option>
            </select>
        </div>
        <div class="wrapper">
            <select id="b-pkg" class="select-custom"></select>
        </div>
        <button onclick="buyKey()" class="btn-buy italic">XÁC NHẬN MUA</button>
    </div>
</div>

<script>
const config = { databaseURL: "https://shopmduy-default-rtdb.asia-southeast1.firebasedatabase.app" };
firebase.initializeApp(config);
const db = firebase.database();

function updateBSelect() {
    const type = document.getElementById('b-type').value;
    const select = document.getElementById('b-pkg');
    select.innerHTML = "";
    db.ref('system/pkgs/' + type).once('value', snapshot => {
        const pkgs = snapshot.val();
        if (!pkgs) {
            let opt = document.createElement('option');
            opt.textContent = "HẾT HÀNG";
            select.appendChild(opt);
            return;
        }
        Object.entries(pkgs).forEach(([id, p]) => {
            db.ref(`keys/${type}/${id}`).on('value', ks => {
                const count = ks.numChildren();
                let opt = select.querySelector(`option[value="${id}"]`);
                if(!opt) {
                    opt = document.createElement('option');
                    opt.value = id;
                    select.appendChild(opt);
                }
                opt.textContent = `${Number(p.price).toLocaleString()}đ / ${p.name} (Còn ${count})`;
            });
        });
    });
}

updateBSelect();

function buyKey() {
    const pid = document.getElementById('b-pkg').value;
    if(!pid || pid === "HẾT HÀNG") return;
    db.ref(`system/pkgs/${document.getElementById('b-type').value}/${pid}`).once('value', sp => {
        const p = sp.val();
        db.ref('users/mduytc/balance').once('value', sb => {
            let bal = sb.val()||0;
            if(bal < p.price) return Swal.fire('!', 'Không đủ tiền', 'error');
            db.ref(`keys/${document.getElementById('b-type').value}/${pid}`).limitToFirst(1).once('value', sk => {
                if(!sk.exists()) return;
                db.ref('users/mduytc/balance').set(bal - p.price);
                const kID = Object.keys(sk.val())[0], kv = sk.val()[kID];
                db.ref(`keys/${document.getElementById('b-type').value}/${pid}/${kID}`).remove();
                Swal.fire({ title: 'XONG', background: '#050505', color: '#00f2ff', html: `<textarea readonly style="width:100%;height:100px;background:#000;color:#00f2ff;border:1px solid #00f2ff;border-radius:10px;text-align:center;padding:10px">${kv.replace(/\|/g,'\n')}</textarea>` });
            });
        });
    });
}
</script>
</body>
</html>
